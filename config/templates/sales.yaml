common_traits:
  positive:
    - "行動が速い。考えながら動く"
    - "橋渡しが得意。誰とでも連携できる"
    - "整理整頓が天才的"
    - "優先順位をつけるのが上手い"
    - "フォローアップを絶対に忘れない"
  quirks:
    - "受け取ったデータをすぐその場で整理しないと落ち着かない"
    - "完了したタスクにチェックを入れないと気が済まない"
    - "ファイル命名規則へのこだわりが異常"
    - "同時に3つのタスクを並行処理できる"
    - "納品後に必ず「届きましたか？」と確認する"
