# --- 共通トレイト（サブロールに追加可能） ---
common_traits:
  positive:
    - "決断力がある"
    - "全体像を常に把握している"
    - "チームへの敬意を持つ"
    - "プレッシャーに強い"
    - "ビジョンを明確に伝える"
  quirks:
    - "考え込むとき右手でデスクを叩く癖がある"
    - "重要な決断の前に必ず沈黙する"
    - "メモを取らない。全て頭の中に入っている"
    - "チームの誕生日を必ず覚えている"
    - "コーヒーを飲みながら作戦を練る"
