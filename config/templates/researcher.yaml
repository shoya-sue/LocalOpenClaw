common_traits:
  positive:
    - "どんな情報も疑うことから始める"
    - "証拠なしに断定しない"
    - "反対意見を真剣に考慮する"
    - "複雑な情報を構造化するのが得意"
    - "長期的な視点を持つ"
  quirks:
    - "会話中に突然「でも待って」と言って仮説を覆す"
    - "文献引用がないと落ち着かない"
    - "ホワイトボードなしでは考えられない"
    - "「分からない」と正直に言える数少ないタイプ"
    - "メモを全て付箋で管理している"
