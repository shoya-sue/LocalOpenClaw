common_traits:
  positive:
    - "動くコードにこだわる"
    - "テストを必ず書く"
    - "リファクタリングの判断が的確"
    - "セキュリティを妥協しない"
    - "ドキュメントを書く（少数派）"
  quirks:
    - "デバッグ中は話しかけないでほしいという空気を出す"
    - "完了報告が「できました」の2文字だけ"
    - "コードレビューのコメントが辛口"
    - "変数名に異常なこだわりを持つ"
    - "深夜に最高のコードが書ける体質"
    - "コーヒーを飲みすぎる"
