goals:
  - id: investigate_performance
    description: "APIレスポンスの遅延原因を特定し、改善案を output/performance_report.md に保存する"
    success_criteria: "output/performance_report.md が存在し、内容に数値または具体的な改善案が含まれる"
    max_cycles: 3
    check_file: "performance_report.md"
    check_keywords:
      - "改善"
      - "遅延"
      - "ミリ秒"
    min_chars: 100

  - id: create_knowledge_report
    description: "data/ 配下の情報から有益な知識レポートを output/knowledge_report.md に作成する"
    success_criteria: "output/knowledge_report.md が存在し、200文字以上の内容がある"
    max_cycles: 3
    check_file: "knowledge_report.md"
    check_keywords: []
    min_chars: 200

  - id: create_project_proposal
    description: "AI同士の協働で短期プロジェクトの提案書を output/project_proposal.md に作成する"
    success_criteria: "output/project_proposal.md が存在し、プロジェクト名・目標・担当が含まれる"
    max_cycles: 3
    check_file: "project_proposal.md"
    check_keywords:
      - "プロジェクト"
      - "目標"
    min_chars: 150

  - id: create_video_themes
    description: "動画コンテンツサービス向けの動画テーマを10個考えて、output/video_themes.md に保存する。各テーマにタイトルと概要を含めること"
    success_criteria: "output/video_themes.md が存在し、タイトルと概要を含む動画テーマが記載されている"
    max_cycles: 3
    check_file: "video_themes.md"
    check_keywords:
      - "動画"
      - "テーマ"
    min_chars: 200

  - id: create_video_series
    description: "視聴者に人気が出そうな動画シリーズ企画を5つ考え、各シリーズのタイトルと最初の5話分のエピソードタイトルを output/video_series.md に保存する"
    success_criteria: "output/video_series.md が存在し、シリーズタイトルとエピソードが含まれている"
    max_cycles: 3
    check_file: "video_series.md"
    check_keywords:
      - "シリーズ"
      - "エピソード"
    min_chars: 200

  - id: create_video_planning
    description: "トレンドを活かした動画コンテンツ企画書を output/video_planning.md に作成する。タイトル・概要・ターゲット視聴者・差別化ポイントを含めること"
    success_criteria: "output/video_planning.md が存在し、ターゲットと差別化ポイントが含まれている"
    max_cycles: 3
    check_file: "video_planning.md"
    check_keywords:
      - "ターゲット"
      - "差別化"
    min_chars: 200

  - id: content_ai_daily
    description: "AIと日常生活をテーマにした60秒縦型動画のコンテンツをJSON形式で output/content_ai_daily.json に作成する。title/platform/target_audience/hook/script/cta/hashtagsを含めること"
    success_criteria: "output/content_ai_daily.json が存在し、hookとscriptが含まれている"
    max_cycles: 3
    check_file: "content_ai_daily.json"
    check_keywords:
      - "hook"
      - "script"
    min_chars: 100

